[profile.default]
optimizer = true
optimizer_runs = 44444444
via_ir = true
ffi = true
fs_permissions = [{ access = 'read-write', path = './'}]

additional_compiler_profiles = [
  { name = "si_router", via_ir = true, optimizer_runs = 1500 },
]

compilation_restrictions = [
  { paths = "src/KSSmartIntentRouter.sol", optimizer_runs = 1500 },

]
[lint]
lint_on_build = false

[fmt]
line_length = 100
tab_width = 2
quote_style = 'single'
number_underscore = 'thousands'
sort_imports = true

[fuzz]
runs = 20

[rpc_endpoints]
mainnet = "${RPC_1}"
bsc_mainnet = "${RPC_56}"
polygon_mainnet = "${RPC_137}"
avalanche_mainnet = "${RPC_43114}"
arbitrum_mainnet = "${RPC_42161}"
optimism_mainnet = "${RPC_10}"
linea_mainnet = "${RPC_59144}"
base_mainnet = "${RPC_8453}"
mantle_mainnet = "${RPC_5000}"
bera_mainnet = "${RPC_80094}"
ronin_mainnet = "${RPC_2020}"
uni_mainnet = "${RPC_130}"
etherlink_mainnet = "${RPC_42793}"
plasma_mainnet = "${RPC_9745}"
hyperevm_mainnet = "${RPC_999}"
sonic_mainnet = "${RPC_146}"
monad_mainnet = "${RPC_143}"
monad_testnet = "${RPC_10143}"
megaeth_mainnet = "${RPC_4326}"
rise_mainnet = "${RPC_4153}"

